<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Log v2.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-4 md:p-8">
    <div class="max-w-xl mx-auto bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
        <h1 class="text-2xl font-bold mb-2 text-slate-800 flex justify-between">
            Time Log <span class="text-[10px] text-blue-500 font-mono">v2.5 (22:10:28)</span>
        </h1>
        
        <div class="space-y-6">
            <!-- テキスト貼り付けエリア -->
            <div class="bg-blue-50 p-5 rounded-xl border border-blue-100">
                <label class="block text-sm font-bold text-blue-900 mb-3">議事録解析（貼り付け）</label>
                <textarea id="textInput" rows="8" class="w-full p-4 border border-blue-200 rounded-lg text-sm mb-4 outline-none focus:ring-2 focus:ring-blue-500" placeholder="ここにテキストをペースト..."></textarea>
                <input type="file" id="fileInput" class="block w-full text-xs text-slate-500 mb-4">
                <button onclick="processMinutes()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold text-sm shadow-md hover:bg-blue-700 transition active:scale-95">AI 要約を実行</button>
            </div>

            <!-- 解析結果 -->
            <div id="result" class="hidden">
                <pre id="output" class="bg-slate-900 text-slate-300 p-5 rounded-xl text-xs overflow-x-auto whitespace-pre-wrap font-mono"></pre>
            </div>

            <hr class="border-slate-100">

            <!-- 既存フォーム（念のため残す） -->
            <div class="opacity-40">
                <h2 class="text-sm font-bold text-slate-700 mb-4">打刻フォーム</h2>
                <div class="space-y-4">
                    <select class="w-full p-3 border rounded-xl text-sm bg-white"><option>--- 選択 ---</option></select>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js?v=1773061828"></script>
</body>
</html>
