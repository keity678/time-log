<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Time Log | SHA Inc.</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-8 text-slate-900">
    <div class="max-w-2xl mx-auto bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
        <h1 class="text-2xl font-bold mb-6">議事録解析ツール</h1>
        
        <div class="space-y-4">
            <textarea id="textInput" rows="10" class="w-full p-4 border rounded-xl outline-none focus:ring-2 focus:ring-slate-900" placeholder="ここに議事録を直接貼り付けてください..."></textarea>
            
            <div class="flex items-center space-x-4">
                <div class="flex-grow border-t border-slate-200"></div>
                <span class="text-xs font-bold text-slate-400 uppercase">OR</span>
                <div class="flex-grow border-t border-slate-200"></div>
            </div>

            <input type="file" id="fileInput" class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-slate-100 file:text-slate-700 hover:file:bg-slate-200">
            
            <button onclick="processMinutes()" class="w-full bg-slate-900 text-white py-4 rounded-xl font-bold hover:bg-slate-800 transition">解析実行</button>
        </div>

        <div id="result" class="mt-8 hidden border-t pt-6">
            <h2 class="text-sm font-bold text-slate-500 mb-2 tracking-widest uppercase">Analysis Result</h2>
            <pre id="output" class="bg-slate-900 text-slate-300 p-6 rounded-xl overflow-x-auto text-sm leading-relaxed whitespace-pre-wrap font-mono"></pre>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
