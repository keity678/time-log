<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Log v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-4 md:p-8">
    <div class="max-w-xl mx-auto bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
        <h1 class="text-2xl font-bold mb-6 text-slate-800">Time Log <span class="text-sm font-normal text-blue-500">v2.0</span></h1>
        
        <div class="space-y-6">
            <div class="bg-blue-50 p-4 rounded-xl border border-blue-100">
                <label class="block text-sm font-bold text-blue-800 mb-2">議事録解析（ここに貼り付け）</label>
                <textarea id="textInput" rows="5" class="w-full p-3 border border-blue-200 rounded-lg text-sm mb-3 outline-none focus:ring-2 focus:ring-blue-500" placeholder="会議ログをここにペースト..."></textarea>
                <div class="text-center text-[10px] text-slate-400 mb-3 font-bold uppercase tracking-widest">OR</div>
                <input type="file" id="fileInput" class="block w-full text-xs text-slate-500 file:mr-4 file:py-1 file:px-3 file:rounded-full file:border-0 file:bg-blue-600 file:text-white cursor-pointer">
                <button onclick="processMinutes()" class="w-full mt-4 bg-blue-600 text-white py-3 rounded-lg font-bold text-sm shadow-md hover:bg-blue-700 transition">AI 解析実行</button>
            </div>

            <div id="result" class="hidden">
                <pre id="output" class="bg-slate-900 text-slate-300 p-4 rounded-xl text-xs overflow-x-auto whitespace-pre-wrap leading-relaxed font-mono"></pre>
            </div>

            <hr class="border-slate-100">

            <div class="space-y-4 opacity-50">
                <h2 class="text-sm font-bold text-slate-700">打刻記録（手動入力）</h2>
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1">クライアント</label>
                    <select id="clientSelect" class="w-full p-2 border rounded-lg text-sm bg-white"><option>--- 選択 ---</option></select>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
